name: CI/CD Deploy to Railway

on:
  push:
    branches:
      - main
      - master
    paths:
      - '06-lab-complete/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach --service "lab12-06"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: "a82d50d2-397a-4fdf-bef8-c4828744c153"
        working-directory: ./06-lab-complete  # Trỏ vào đúng thư mục code
