name: CI/CD Deploy to Railway

on:
  push:
    branches:
      - main
      - master
    paths:
      - '06-lab-complete/**'  # Chỉ trigger khi có thay đổi trong thư mục lab 06

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach --service $RAILWAY_SERVICE_NAME
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_NAME: ${{ secrets.RAILWAY_SERVICE_NAME }} 
        working-directory: ./06-lab-complete  # Trỏ vào đúng thư mục code
